name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore EasyMovie.sln

      - name: Build
        run: dotnet build EasyMovie.Client/EasyMovie.Client.csproj -c Release -p:BuildInParallel=false

      - name: Publish (portable)
        run: >
          dotnet publish EasyMovie.Client/EasyMovie.Client.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:BuildInParallel=false
          -o publish/portable

      - name: Zip portable
        run: Compress-Archive -Path publish/portable/* -DestinationPath EasyMovie-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: EasyMovie ${{ github.ref_name }}
          body: |
            ## EasyMovie ${{ github.ref_name }}

            Windows 桌面电影收藏管理应用。

            ### 下载
            - **EasyMovie-win-x64.zip** — 便携版，解压即用

            ### 环境要求
            - Windows 10/11 x64
          files: EasyMovie-win-x64.zip
          generate_release_notes: true